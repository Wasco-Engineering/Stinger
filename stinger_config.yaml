app:
  name: Stinger
  version: 0.1.0
hardware:
  labjack:
    device_type: T7
    connection_type: USB
    identifier: ANY
    resolution_index: 9
    pressure_filter_alpha: 0.0
    port_a:
      transducer_ain: 2
      transducer_ain_neg: 3
      transducer_voltage_min: 0
      transducer_voltage_max: 10
      transducer_pressure_min: 0.0
      transducer_pressure_max: 30.0
      transducer_reference: absolute
      transducer_installed: true
      switch_no_dio: 9
      switch_nc_dio: 11
      switch_com_dio: 12
      switch_com_state: 0
      switch_active_low: true
      solenoid_dio: 19
    port_b:
      transducer_ain: 0
      transducer_ain_neg: 1
      transducer_voltage_min: 0
      transducer_voltage_max: 10
      transducer_pressure_min: 0.0
      transducer_pressure_max: 30.0
      transducer_reference: absolute
      transducer_installed: true
      switch_no_dio: 0
      switch_nc_dio: 2
      switch_com_dio: 3
      switch_com_state: 0
      switch_active_low: true
      solenoid_dio: 18
  alicat:
    baudrate: 115200
    timeout_s: 0.2
    auto_tare_on_connect: true
    auto_tare_max_delta_psi: 0.5
    auto_tare_delay_s: 0.5
    pressure_units_stat: 2
    pressure_units_group: 0
    pressure_units_value: 10
    pressure_units_override: 0
    pressure_index: 0
    gauge_index: 1
    barometric_index: 2
    setpoint_index: 3
    port_a:
      com_port: COM3
      address: A
    port_b:
      com_port: COM3
      address: B
  solenoid:
    vacuum_state: 1
    atmosphere_state: 0
    safe_vacuum_switch_threshold_psi: 2.0
  measurement:
    preferred_source: auto
    fallback_on_unavailable: true
    transducer_only_below_psi: 20.0
    alicat_only_above_psi: 31.0
    switch_pivot_min_psi: 8.0
    sensor_disagreement_fallback_enabled: true
    sensor_disagreement_max_psi: 0.1
control:
  ramps:
    precision_sweep_rate_torr_per_sec: 5.0
  cycling:
    num_cycles: 3
  edge_detection:
    overshoot_beyond_limit_percent: 10.0
    timeout_sec: 60.0
    precision_post_target_grace_sec: 0.35
    precision_return_overshoot_torr: 30.0
  debounce:
    stable_sample_count: 3
    min_edge_interval_ms: 50
timing:
  ui_refresh_interval_ms: 16
  hardware_poll_interval_ms: 7
  alicat_poll_divisor: 4
  alicat_poll_divisor_normal: 14
  alicat_poll_divisor_precision: 2
  labjack_poll_divisor_sibling: 14
  hardware_poll_interval_ms_precision: 0
  button_lockout_ms: 300
  graceful_stop_timeout_sec: 5.0
database:
  type: mssql
  server: PASCAL
  database: WASCO_Calibration
  driver: ODBC Driver 18 for SQL Server
  username: ''
  password: ''
  connection_timeout_sec: 5.0
max_database:
  database: ExactMAXWasco
ui:
  theme: dark
  min_touch_target_px: 44
  admin_pin: '2245'
  debug_noise:
    window_samples: 60
    min_samples: 12
    trend_alpha: 0.2
    transition_sigma_factor: 8.0
    max_holdoff_ms: 350
  pressure_display:
    decimal_places: 2
  pressure_bar:
    show_atmosphere_reference: true
    show_acceptance_bands: true
    show_measured_points: true
test_parameters:
  equipment_id: STINGER_01
  default_temperature_c: 25.0
  max_attempts: 3
custom_work_orders:
  stinger228:
    part_id: SPS00000
    sequence_id: '300'
    order_qty: 1
logging:
  level: INFO
  log_dir: logs
  max_bytes: 10485760
  backup_count: 5
